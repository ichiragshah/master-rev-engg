<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Guard - Exposure Alerts</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 480px;
      padding: 20px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 32px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 24px;
    }
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 6px;
    }
    input, select {
      width: 100%;
      padding: 10px 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus, select:focus {
      border-color: #4a9eff;
    }
    input::placeholder { color: #555; }
    select { cursor: pointer; }
    select option { background: #111; }
    .checkbox-group, .radio-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .cb, .rb {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      padding: 6px 10px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
    }
    .cb input, .rb input { accent-color: #4a9eff; cursor: pointer; }
    .hint { color: #666; font-size: 11px; }
    .info-box {
      background: #0d1b2a;
      border: 1px solid #1b3a5c;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.5;
      color: #7bb8e0;
    }
    .info-box b { color: #9dd1f5; }
    button {
      width: 100%;
      padding: 12px;
      background: #4a9eff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a8eef; }
    button:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }
    .msg {
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .msg.success {
      display: block;
      background: #0a2e1a;
      border: 1px solid #1a5c3a;
      color: #6fcf97;
    }
    .msg.error {
      display: block;
      background: #2e0a0a;
      border: 1px solid #5c1a1a;
      color: #f07070;
    }
    .tg-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .tg-row input { flex: 1; }
    .tg-btn {
      width: 36px;
      min-width: 36px;
      padding: 0;
      font-size: 18px;
      line-height: 36px;
      border-radius: 8px;
      text-align: center;
    }
    .tg-btn.remove {
      background: #5c1a1a;
      color: #f07070;
    }
    .tg-btn.remove:hover { background: #7c2a2a; }
    .tg-btn.add {
      background: #1a3a1a;
      color: #6fcf97;
    }
    .tg-btn.add:hover { background: #2a5a2a; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Book Guard</h1>
      <p class="subtitle">Exposure monitoring & Telegram alerts</p>

      <div class="info-box">
        <b>Step 1:</b> Message <b id="bot-link">the bot</b> on Telegram and send <b>/start</b><br>
        <b>Step 2:</b> Fill in the form below and submit
      </div>

      <form id="regForm">
        <div class="field">
          <label>Platform *</label>
          <select name="platform">
            <option value="winner7">Winner7</option>
            <option value="leoexch">LeoExch</option>
          </select>
        </div>
        <div class="field">
          <label>Your Name</label>
          <input type="text" name="name" placeholder="John Doe">
        </div>
        <div class="field">
          <label>Platform Username *</label>
          <input type="text" name="username" required placeholder="your_username">
        </div>
        <div class="field">
          <label>Platform Password *</label>
          <input type="password" name="password" required placeholder="your_password">
        </div>
        <div class="field">
          <label>Alert Threshold in Rs (optional, default 50000)</label>
          <input type="number" name="threshold" placeholder="50000" min="0">
        </div>
        <div class="field">
          <label>Alert Type</label>
          <select name="alert_type">
            <option value="exposure_only">Net Exposure Only</option>
            <option value="exposure_and_markets">Exposure + Markets</option>
            <option value="all">Everything</option>
          </select>
        </div>
        <div class="field">
          <label>Monitor Sports</label>
          <div class="checkbox-group" id="sportsGroup">
            <label class="cb"><input type="checkbox" name="sport" value="All" checked> All</label>
            <label class="cb"><input type="checkbox" name="sport" value="Cricket"> Cricket</label>
            <label class="cb"><input type="checkbox" name="sport" value="Soccer"> Soccer</label>
            <label class="cb"><input type="checkbox" name="sport" value="Tennis"> Tennis</label>
            <label class="cb"><input type="checkbox" name="sport" value="Horse Racing"> Horse Racing</label>
            <label class="cb"><input type="checkbox" name="sport" value="Greyhound Racing"> Greyhound Racing</label>
          </div>
        </div>
        <div class="field">
          <label>Book View</label>
          <div class="radio-group">
            <label class="rb"><input type="radio" name="book_view" value="Total Book" checked> Total Book <span class="hint">Your full book</span></label>
            <label class="rb"><input type="radio" name="book_view" value="My PT"> My PT <span class="hint">Your percentage share only</span></label>
          </div>
        </div>
        <div class="field">
          <label>Telegram Usernames * (without @)</label>
          <div id="tgList">
            <div class="tg-row">
              <input type="text" name="tg_user" required placeholder="telegram_user_1">
              <button type="button" class="tg-btn add" onclick="addTgRow()" title="Add another">+</button>
            </div>
          </div>
        </div>
        <button type="submit">Register</button>
      </form>

      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script>
    // Show bot username in instructions
    fetch('/health').then(() => {
      const el = document.getElementById('bot-link');
      // Bot username is rendered server-side via the page or we just show generic
      el.textContent = '@' + (window.__BOT_USERNAME || 'book_guard_bot');
    });

    // Sports checkbox toggle: All unchecks others, others uncheck All
    document.getElementById('sportsGroup').addEventListener('change', (e) => {
      const boxes = document.querySelectorAll('#sportsGroup input[type=checkbox]');
      const allBox = boxes[0];
      if (e.target.value === 'All' && e.target.checked) {
        boxes.forEach(b => { if (b !== allBox) b.checked = false; });
      } else if (e.target.value !== 'All' && e.target.checked) {
        allBox.checked = false;
      }
      // If nothing checked, re-check All
      const anyChecked = [...boxes].some(b => b.checked);
      if (!anyChecked) allBox.checked = true;
    });

    function addTgRow() {
      const list = document.getElementById('tgList');
      const count = list.querySelectorAll('.tg-row').length;
      const row = document.createElement('div');
      row.className = 'tg-row';
      row.innerHTML = `<input type="text" name="tg_user" required placeholder="telegram_user_${count + 1}"><button type="button" class="tg-btn remove" onclick="removeTgRow(this)" title="Remove">-</button>`;
      list.appendChild(row);
    }

    function removeTgRow(btn) {
      const list = document.getElementById('tgList');
      if (list.querySelectorAll('.tg-row').length > 1) {
        btn.closest('.tg-row').remove();
      }
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const msg = document.getElementById('msg');

      btn.disabled = true;
      btn.textContent = 'Registering...';
      msg.className = 'msg';
      msg.style.display = 'none';

      const fd = new FormData(e.target);
      const sports = fd.getAll('sport').join(',') || 'All';
      const tgUsers = fd.getAll('tg_user').map(u => u.trim().replace('@', '')).filter(Boolean);
      const data = Object.fromEntries(fd);
      delete data.sport;
      delete data.tg_user;
      data.sports = sports;
      data.telegram_usernames = tgUsers.join(',');

      if (tgUsers.length === 0) {
        msg.textContent = 'At least one Telegram username is required.';
        msg.className = 'msg error';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Register';
        return;
      }

      try {
        const res = await fetch('/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        });
        const json = await res.json();

        msg.textContent = json.message;
        msg.className = json.success ? 'msg success' : 'msg error';
        msg.style.display = 'block';

        if (json.success) {
          e.target.reset();
          // Reset telegram inputs to single row
          const list = document.getElementById('tgList');
          list.innerHTML = '<div class="tg-row"><input type="text" name="tg_user" required placeholder="telegram_user_1"><button type="button" class="tg-btn add" onclick="addTgRow()" title="Add another">+</button></div>';
        }
      } catch (err) {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'msg error';
        msg.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Register';
    });
  </script>
</body>
</html>
